name: Preview Deployment (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.preview.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend build for preview
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.11

      - name: Backend deps sync
        working-directory: backend
        run: uv sync

      - name: Deploy preview
        id: preview
        env:
          PREVIEW_ID: pr-${{ github.event.pull_request.number }}
          MONGODB_URI: ${{ secrets.MONGODB_URI_PREVIEW }}
          REDIS_URL: ${{ secrets.REDIS_URL_PREVIEW }}
        run: |
          echo "Run preview deploy for $PREVIEW_ID"
          # Example:
          # ./scripts/deploy-preview.sh "$PREVIEW_ID"
          echo "url=https://${PREVIEW_ID}.preview.example.com" >> "$GITHUB_OUTPUT"

      - name: Comment preview link
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const body = `✅ Preview deployed: ${{ steps.preview.outputs.url }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

  cleanup-preview:
    name: Cleanup preview
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Destroy preview env
        run: |
          echo "Destroy preview for pr-${{ github.event.pull_request.number }}"
          # Example:
          # ./scripts/destroy-preview.sh "pr-${{ github.event.pull_request.number }}"