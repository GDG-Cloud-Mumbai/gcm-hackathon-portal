name: CD (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build-verify:
    name: Build verify (frontend + backend deps)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.11

      - name: Backend sync deps
        working-directory: backend
        run: uv sync

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-verify
    environment:
      name: production
      url: ${{ steps.out.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        id: out
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI_PROD }}
          REDIS_URL: ${{ secrets.REDIS_URL_PROD }}
        run: |
          echo "Run your production deploy command here"
          # Example:
          # ./scripts/deploy-prod.sh
          echo "url=https://your-production-url.example.com" >> "$GITHUB_OUTPUT"